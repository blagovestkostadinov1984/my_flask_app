<!DOCTYPE html>
<html lang="bg">

    <title>Регистрация - История и География</title>
</head>

    <form>
        <p>
            <label>Име:</label><br>

        </p>

            <label>Фамилия:</label><br>
            <input type="text" placeholder="Въведете фамилия">
        </p>

        <p>
            <label>Имейл:</label><br>
            <input type="email" placeholder="example@mail.com">
        </p>

        <p>
            <label>Парола:</label><br>
            <input type="password" placeholder="Въведете сигурна парола">
        </p>

        <button type="submit">Изпрати регистрацията</button>
    </form>

    <br>
    <a href="/">Върни се в началото</a>
